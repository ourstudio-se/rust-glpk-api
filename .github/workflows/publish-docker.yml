name: Publish Docker Images to DockerHub

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  get-version:
    name: Get crate version
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Extract version
        id: extract
        run: |
          # If triggered by a tag push, use the tag name (strip leading v if present).
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            REF=${GITHUB_REF#refs/tags/}
            VERSION=${REF#v}
          else
            VERSION=$(sed -n 's/^version *= *"\(.*\)"/\1/p' Cargo.toml | head -n1)
          fi
          if [ -z "$VERSION" ]; then
            echo "No version found" >&2
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  push-glpk:
    name: Build and push GLPK image
    runs-on: ubuntu-24.04
    needs: get-version
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Check DockerHub semver tag doesn't exist (GLPK)
        env:
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          VERSION: ${{ needs.get-version.outputs.version }}
        run: |
          repo="ourstudio/rust-multi-solver-api"
          tag_to_check="glpk-${VERSION}"
          status=$(curl -s -o /dev/null -w "%{http_code}" -u "$DOCKERHUB_USER:$DOCKERHUB_TOKEN" \
            "https://hub.docker.com/v2/repositories/${repo}/tags/${tag_to_check}/")
          if [ "$status" = "200" ]; then
            echo "Docker tag ${tag_to_check} already exists — aborting push." >&2
            exit 1
          fi

      - name: Build and push GLPK image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.glpk
          platforms: linux/amd64,linux/arm64
          tags: |
            ourstudio/rust-multi-solver-api:glpk-latest
            ourstudio/rust-multi-solver-api:glpk-${{ needs.get-version.outputs.version }}
          push: true

  push-highs:
    name: Build and push HiGHS image
    runs-on: ubuntu-24.04
    needs: get-version
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Check DockerHub semver tag doesn't exist (HiGHS)
        env:
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          VERSION: ${{ needs.get-version.outputs.version }}
        run: |
          repo="ourstudio/rust-multi-solver-api"
          tag_to_check="highs-${VERSION}"
          status=$(curl -s -o /dev/null -w "%{http_code}" -u "$DOCKERHUB_USER:$DOCKERHUB_TOKEN" \
            "https://hub.docker.com/v2/repositories/${repo}/tags/${tag_to_check}/")
          if [ "$status" = "200" ]; then
            echo "Docker tag ${tag_to_check} already exists — aborting push." >&2
            exit 1
          fi

      - name: Build and push HiGHS image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.highs
          platforms: linux/amd64,linux/arm64
          tags: |
            ourstudio/rust-multi-solver-api:highs-latest
            ourstudio/rust-multi-solver-api:highs-${{ needs.get-version.outputs.version }}
          push: true

  push-multi:
    name: Build and push Multi-solver image
    runs-on: ubuntu-24.04
    needs: get-version
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Check DockerHub semver tag doesn't exist (Multi)
        env:
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          VERSION: ${{ needs.get-version.outputs.version }}
        run: |
          repo="ourstudio/rust-multi-solver-api"
          tag_to_check="${VERSION}"
          status=$(curl -s -o /dev/null -w "%{http_code}" -u "$DOCKERHUB_USER:$DOCKERHUB_TOKEN" \
            "https://hub.docker.com/v2/repositories/${repo}/tags/${tag_to_check}/")
          if [ "$status" = "200" ]; then
            echo "Docker tag ${tag_to_check} already exists — aborting push." >&2
            exit 1
          fi

      - name: Build and push Multi-solver image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.multi
          platforms: linux/amd64,linux/arm64
          tags: |
            ourstudio/rust-multi-solver-api:latest
            ourstudio/rust-multi-solver-api:${{ needs.get-version.outputs.version }}
          push: true
