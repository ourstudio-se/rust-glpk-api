name: Publish Docker Images to DockerHub

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  get-version:
    name: Get crate version
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Extract version
        id: extract
        run: |
          VERSION=$(sed -n 's/^version *= *"\(.*\)"/\1/p' Cargo.toml | head -n1)
          if [ -z "$VERSION" ]; then
            echo "No version found in Cargo.toml" >&2
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  push-glpk:
    name: Build and push GLPK image
    runs-on: ubuntu-24.04
    needs: get-version
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push GLPK image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.glpk
          platforms: linux/amd64,linux/arm64
          tags: |
            ourstudio/rust-multi-solver-api:glpk-latest
            ourstudio/rust-multi-solver-api:glpk-${{ needs.get-version.outputs.version }}
          push: true

  push-highs:
    name: Build and push HiGHS image
    runs-on: ubuntu-24.04
    needs: get-version
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push HiGHS image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.highs
          platforms: linux/amd64,linux/arm64
          tags: |
            ourstudio/rust-multi-solver-api:highs-latest
            ourstudio/rust-multi-solver-api:highs-${{ needs.get-version.outputs.version }}
          push: true

  push-multi:
    name: Build and push Multi-solver image
    runs-on: ubuntu-24.04
    needs: get-version
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Multi-solver image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.multi
          platforms: linux/amd64,linux/arm64
          tags: |
            ourstudio/rust-multi-solver-api:latest
            ourstudio/rust-multi-solver-api:${{ needs.get-version.outputs.version }}
          push: true
